    const PAST_PAPERS_BY_UNIVERSITY = {
      UNZA: [
        { subject: 'Physics 101', year: 2023, yearLevel: 1, questions: 45, badge: 'UNZA 2023 Y1' },
        { subject: 'Physics 101', year: 2022, yearLevel: 1, questions: 42, badge: 'UNZA 2022 Y1' },
        { subject: 'Math 101', year: 2023, yearLevel: 1, questions: 50, badge: 'UNZA 2023 Y1' },
        { subject: 'Chemistry 101', year: 2023, yearLevel: 1, questions: 40, badge: 'UNZA 2023 Y1' }
      ],
      CBU: [
        { subject: 'Physics 101', year: 2023, yearLevel: 1, questions: 48, badge: 'CBU 2023 Y1' },
        { subject: 'Math 101', year: 2023, yearLevel: 1, questions: 45, badge: 'CBU 2023 Y1' }
      ],
      Mulungushi: [
        { subject: 'Engineering Math', year: 2023, yearLevel: 1, questions: 40, badge: 'Mulungushi 2023 Y1' }
      ],
      ZAOU: [
        { subject: 'Business Accounting', year: 2023, yearLevel: 1, questions: 50, badge: 'ZAOU 2023 Y1' }
      ]
    };

    class AuraAcademy {
      constructor() {
        this.authMode = 'signup';
        this.user = null;
        this.profile = null;
        this.isCEO = false;
        this.subscriptionEnd = null;
        this.checkAuth();
        setInterval(() => this.updateCountdown(), 1000);
      }

      async checkAuth() {
        const { data } = await supabase.auth.getSession();
        if (data.session) {
          this.user = data.session.user;
          await this.loadProfile();
          this.showMainApp();
        }
      }

      async loadProfile() {
        const { data } = await supabase.from('aura_profiles').select('*').eq('user_id', this.user.id).single().catch(() => null);
        if (data) {
          this.profile = data;
          this.subscriptionEnd = new Date(data.subscription_end);
          this.isCEO = data.is_ceo || false;
        } else {
          this.profile = { full_name: 'Student', program: 'Engineering', year: '1', university: 'UNZA' };
          this.subscriptionEnd = new Date(Date.now() + 7*24*60*60*1000);
        }
      }

      toggleAuthMode() {
        this.authMode = this.authMode === 'signup' ? 'signin' : 'signup';
        document.getElementById('signupFields').style.display = this.authMode === 'signup' ? 'block' : 'none';
        document.getElementById('signinFields').style.display = this.authMode === 'signin' ? 'block' : 'none';
      }

      async handleAuth(e) {
        e.preventDefault();
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.classList.remove('show');
        try {
          if (this.authMode === 'signup') {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const fullName = document.getElementById('fullName').value;
            const program = document.getElementById('program').value;
            const year = document.getElementById('year').value;
            const university = document.getElementById('university').value;
            const isCEO = email === 'Mwewadavid781@gmail.com';

            const { error: signupError } = await supabase.auth.signUp({ email, password });
            if (signupError) throw signupError;

            const { data } = await supabase.auth.getSession();
            this.user = data.session.user;

            const subEnd = new Date(Date.now() + 7*24*60*60*1000).toISOString();
            await supabase.from('aura_profiles').insert({
              user_id: this.user.id,
              full_name: fullName,
              program,
              year,
              university,
              subscription_end: subEnd,
              is_ceo: isCEO
            }).catch(() => {});

            await this.loadProfile();
            this.showMainApp();
          } else {
            const email = document.getElementById('signinEmail').value;
            const password = document.getElementById('signinPassword').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            const { data } = await supabase.auth.getSession();
            this.user = data.session.user;
            await this.loadProfile();
            this.showMainApp();
          }
        } catch (error) {
          errorMsg.textContent = error.message;
          errorMsg.classList.add('show');
        }
      }

      showMainApp() {
        document.getElementById('authView').classList.remove('active');
        document.getElementById('mainView').classList.add('active');
        document.getElementById('studentNameDisplay').textContent = this.profile.full_name;
        document.getElementById('initials').textContent = this.profile.full_name.substring(0, 2).toUpperCase();
        document.getElementById('modeBadge').textContent = `📚 ${this.profile.program} • Year ${this.profile.year} • ${this.profile.university}`;
        if (this.isCEO) {
          document.getElementById('modeText').textContent = 'CEO + STUDENT';
          document.getElementById('ceoTabBtn').style.display = 'block';
        }
        this.renderCourses();
        this.renderPastPapers();
        if (this.isCEO) this.renderCEOPanel();
      }

      renderCourses() {
        const yearKey = `Year${this.profile.year}`;
        const progData = ZAMBIAN_PROGRAMS[this.profile.program];
        const yearData = progData?.[yearKey];
        const courses = yearData?.[this.profile.university] || [];

        const grid = document.getElementById('subjectsGrid');
        grid.innerHTML = courses.map((course, idx) => `
          <div class="subject-card" style="animation-delay: ${0.15 + idx*0.1}s" onclick="app.showCourseSummary('${course.code}', '${course.name}', \`${course.summary}\`)">
            <div class="subject-code">${course.code}</div>
            <div class="subject-name">${course.name}</div>
            <div class="progress-bar"><div class="progress-fill" style="width: 65%"></div></div>
          </div>
        `).join('');

        if (courses.length === 0) {
          grid.innerHTML = '<p style="color: #64748b; grid-column: 1/-1;">No courses available for your program/year/university yet.</p>';
        }
      }

      showCourseSummary(code, name, summary) {
        const modal = document.getElementById('paymentModal');
        modal.innerHTML = `
          <div class="modal-overlay modal-open" onclick="if(event.target===this) document.getElementById('paymentModal').innerHTML=''">
            <div class="modal">
              <h2 class="modal-title">${code}: ${name}</h2>
              <div class="summary-box"><div class="summary-content">${summary}</div></div>
              <button class="submit-btn" onclick="app.startExam('${code}')">Start 30 Question Exam</button>
            </div>
          </div>
        `;
      }

      startExam(courseCode) {
        const modal = document.getElementById('paymentModal');
        modal.innerHTML = `
          <div class="modal-overlay modal-open" onclick="if(event.target===this) document.getElementById('paymentModal').innerHTML=''">
            <div class="modal" style="max-height: 90vh;">
              <h2 class="modal-title">${courseCode} Practice Exam</h2>
              <div style="max-height: 70vh; overflow-y: auto; background: #060913; padding: 16px; border-radius: 6px;">
                <p style="color: #64748b; text-align: center;">Coming soon: 30 interactive questions will appear here with instant feedback!</p>
              </div>
              <button class="submit-btn" onclick="alert('✅ Feature launching soon!')">Start Exam</button>
            </div>
          </div>
        `;
      }

      renderPastPapers() {
        const container = document.getElementById('pastPapersContainer');
        const papers = PAST_PAPERS_BY_UNIVERSITY[this.profile.university] || [];
        
        if (papers.length === 0) {
          container.innerHTML = '<p style="color: #64748b;">No past papers available yet for your university.</p>';
          return;
        }

        container.innerHTML = `
          <h3 class="dashboard-title">📄 Past Papers - ${this.profile.university}</h3>
          <div>${papers.map(p => `
            <div class="exam-card">
              <div class="exam-info">
                <h4>${p.subject} - ${p.badge}</h4>
                <p>${p.questions} questions</p>
              </div>
              <button class="exam-badge" onclick="alert('Starting exam...')">Start</button>
            </div>
          `).join('')}</div>
        `;
      }

      renderCEOPanel() {
        const container = document.getElementById('ceoContainer');
        container.innerHTML = `
          <h3 class="dashboard-title">👑 CEO CONTROL PANEL</h3>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-number">K1,000</div><div class="stat-label">This Week</div></div>
            <div class="stat-card"><div class="stat-number">25</div><div class="stat-label">Active</div></div>
            <div class="stat-card"><div class="stat-number">5</div><div class="stat-label">Waiting</div></div>
          </div>
          <h4 style="margin-top: 24px; margin-bottom: 12px;">Students Waiting Unlock</h4>
          <div class="payment-card">
            <div class="payment-info"><h3>Sarah</h3><p>Paid K10</p></div>
            <button class="unlock-btn" onclick="alert('✅ Sarah unlocked!')">UNLOCK</button>
          </div>
        `;
      }

      showGuide() {
        const modal = document.getElementById('paymentModal');
        modal.innerHTML = `
          <div class="modal-overlay modal-open" onclick="if(event.target===this) document.getElementById('paymentModal').innerHTML=''">
            <div class="modal">
              <h2 class="modal-title">📖 How to Use Aura</h2>
              <div class="guide-step">
                <div class="guide-step-title">1️⃣ Courses Tab</div>
                <div class="guide-step-text">Click any course to see a summary with formulas and examples. Start the 30-question exam to test your knowledge.</div>
              </div>
              <div class="guide-step">
                <div class="guide-step-title">2️⃣ Past Papers</div>
                <div class="guide-step-text">Practice full exam papers from your university. Each university has different papers - we've matched them!</div>
              </div>
              <div class="guide-step">
                <div class="guide-step-title">3️⃣ Payment (7 Days)</div>
                <div class="guide-step-text">Click countdown timer. Send K10 to 0964969767. Message +260750109917 and Tekaru unlocks you!</div>
              </div>
              <button class="submit-btn" onclick="document.getElementById('paymentModal').innerHTML=''">Got it!</button>
            </div>
          </div>
        `;
      }

      switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tab + 'Tab').classList.add('active');
      }

      updateCountdown() {
        const now = new Date();
        const diff = this.subscriptionEnd - now;
        const days = Math.floor(diff / (1000*60*60*24));
        const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
        const elem = document.getElementById('countdownDisplay');
        if (elem) elem.textContent = `${Math.max(0, days)}d ${Math.max(0, hours)}h`;
      }

      showPaymentModal() {
        const modal = document.getElementById('paymentModal');
        modal.innerHTML = `
          <div class="modal-overlay modal-open">
            <div class="modal">
              <h2 class="modal-title">💳 Renew Access</h2>
              <p style="color: #64748b; margin-bottom: 20px;">K10 per week</p>
              <div style="background: #0a0e1a; padding: 16px; border-radius: 8px; margin-bottom: 20px;">
                <h4 style="color: #00f0ff; margin-bottom: 8px;">📱 MTN Mobile Money:</h4>
                <p style="color: #64748b;">Send to: <strong style="color: #05ffb2;">0964969767</strong></p>
                <p style="color: #64748b;">Then WhatsApp: <strong style="color: #05ffb2;">+260750109917</strong></p>
              </div>
              <button class="submit-btn" onclick="window.open('https://wa.me/260750109917?text=I%20paid%20K10', '_blank')">📱 Contact on WhatsApp</button>
            </div>
          </div>
        `;
      }

      async logout() {
        await supabase.auth.signOut();
        document.getElementById('mainView').classList.remove('active');
        document.getElementById('authView').classList.add('active');
      }
    }

    const app = new AuraAcademy();
    document.getElementById('authForm').addEventListener('submit', (e) => app.handleAuth(e));
  </script>
</body>
</html>
