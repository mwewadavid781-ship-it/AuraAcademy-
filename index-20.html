    .auth-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; color: #00f0ff; }

    .success-msg { background: rgba(5, 255, 178, 0.1); border: 1px solid #05ffb2; color: #05ffb2; padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; display: none; }
    .success-msg.show { display: block; }
    
    .app-container { display: flex; flex-direction: column; height: 100vh; }
    .header { padding: 16px 20px; border-bottom: 1px solid #1e293b; background: #0f1626; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
    .header-title { font-size: 18px; font-weight: 700; color: #00f0ff; }
    .header-controls { display: flex; gap: 10px; align-items: center; }

    .logout-btn { background: transparent; border: 1px solid #1e293b; color: #64748b; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .logout-btn:hover { border-color: #ff2e93; color: #ff2e93; }
    
    .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; }
    .page { display: none; } .page.active { display: block; }
    .back-btn { background: none; border: none; color: #00f0ff; cursor: pointer; font-weight: 700; font-size: 13px; margin-bottom: 16px; }
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .page-subtitle { font-size: 12px; color: #64748b; margin-bottom: 20px; }
    
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: linear-gradient(135deg, #1a2a3a 0%, #0f1626 100%); border: 1px solid #1e293b; border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.3s; }

    .card-icon { font-size: 32px; margin-bottom: 10px; }
    .card-name { font-size: 13px; font-weight: 700; }
    
    .course-card { background: linear-gradient(135deg, #1a2f3a 0%, #0f1626 100%); border: 1.5px solid #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 14px; cursor: pointer; transition: all 0.3s; }
    .course-card:hover { border-color: #00f0ff; box-shadow: 0 0 25px rgba(0, 240, 255, 0.12); }
    .course-code { font-size: 11px; color: #00f0ff; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
    .course-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .course-desc { font-size: 11px; color: #94a3b8; margin-bottom: 12px; }
    .mastery-label { font-size: 10px; color: #64748b; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .mastery-bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .mastery-fill { height: 100%; background: linear-gradient(90deg, #00f0ff, #05ffb2); border-radius: 3px; }
    .course-unit { font-size: 11px; color: #64748b; margin-bottom: 10px; }
    .course-action { font-size: 12px; color: #00f0ff; font-weight: 700; }
    
    .list-item { background: #0f1626; border: 1px solid #1e293b; border-radius: 8px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; }
    .list-item:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.05); }
    .list-item-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .list-item-meta { font-size: 11px; color: #64748b; }
    
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.95); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    .modal.show { display: flex; }
    .modal-box { background: #0f1626; border: 1px solid #1e293b; border-radius: 12px; padding: 24px; max-width: 550px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #64748b; font-size: 24px; cursor: pointer; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #00f0ff; }
    
    .question-card { background: #060913; border: 1px solid #1e293b; padding: 16px; border-radius: 10px; margin-bottom: 16px; }
    .question-num { font-size: 11px; color: #00f0ff; font-weight: 700; margin-bottom: 6px; }
    .question-text { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option-btn { background: transparent; border: 1.5px solid #1e293b; padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; text-align: left; font-family: inherit; transition: all 0.3s; color: #f1f5f9; }

    .option-btn.incorrect { border-color: #ff2e93; background: rgba(255, 46, 147, 0.1); color: #ff2e93; }

  <div id="authView" class="view active">

            <input type="text" id="nameInput" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="emailInput" placeholder="email@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="passwordInput" placeholder="Min 6 characters" required>
          </div>
          <div class="form-group">
            <label class="form-label">University</label>
            <select id="uniInput" required>

              <option value="UNZA">UNZA - University of Zambia</option>
              <option value="CBU">CBU - Copperbelt University</option>
              <option value="Mulungushi">Mulungushi University</option>
              <option value="LAMU">LAMU - Lusaka Apex Medical</option>
            </select>
          </div>
          <button type="submit" class="btn">Enter AURA Academy</button>
        </form>
      </div>
    </div>
  </div>

    <div class="app-container">
      <div class="header">
        <div class="header-title">🇿🇲 AURA</div>
        <div class="header-controls">
          <div class="countdown" id="countdown" onclick="app.showPayment()">7d 0h</div>
          <button class="logout-btn" onclick="app.logout()">Logout</button>
        </div>
      </div>

      <div class="content">
        <div id="homePage" class="page active">
          <div class="page-title">Welcome!</div>
          <p class="page-subtitle" id="greeting">Hi there!</p>
          <div id="uniGrid"></div>
        </div>

        <div id="schoolPage" class="page">
          <button class="back-btn" onclick="app.goPage('home')">← Back</button>
          <div class="page-title" id="schoolTitle">Schools</div>
          <p class="page-subtitle">Select a school/faculty</p>
          <div id="schoolList"></div>
        </div>

        <div id="programPage" class="page">
          <button class="back-btn" onclick="app.goPage('school')">← Back</button>
          <div class="page-title" id="programTitle">Programs</div>
          <p class="page-subtitle">Select a program</p>
          <div id="programList"></div>
        </div>

        <div id="yearPage" class="page">
          <button class="back-btn" onclick="app.goPage('program')">← Back</button>
          <div class="page-title">Academic Year</div>
          <p class="page-subtitle">Select a year</p>
          <div id="yearList"></div>
        </div>

        <div id="coursePage" class="page">
          <button class="back-btn" onclick="app.goPage('year')">← Back</button>
          <div class="page-title">Courses</div>
          <p class="page-subtitle">Select a course to study</p>
          <div id="courseList"></div>
        </div>

        <div id="examPage" class="page">
          <button class="back-btn" onclick="app.goPage('course')">← Back</button>
          <div class="page-title" id="examTitle">Exam</div>
          <p class="page-subtitle">30 Questions</p>
          <div id="examContent"></div>
        </div>

        <div id="resultsPage" class="page">
          <button class="back-btn" onclick="app.goPage('course')">← Back</button>
          <div class="page-title">Results</div>
          <div id="resultsContent"></div>
        </div>

        <div id="profilePage" class="page">
          <div class="page-title">Profile</div>
          <div class="list-item">
            <div class="list-item-title" id="profileName">Name</div>
            <div class="list-item-meta" id="profileUni">University</div>
          </div>
          <button class="btn" style="margin-top: 20px;" onclick="app.logout()">Logout</button>
        </div>
      </div>

      <div class="bottom-nav">
        <button class="nav-btn active" onclick="app.goPage('home')">🏠<span class="nav-label">Home</span></button>
        <button class="nav-btn" onclick="app.goPage('course')">📚<span class="nav-label">Courses</span></button>
        <button class="nav-btn" onclick="app.goPage('profile')">👤<span class="nav-label">Profile</span></button>
      </div>
    </div>
  </div>

    class App {
      constructor() {
        this.checkSession();
      }

      checkSession() {
        const session = sessionStorage.getItem('auraSession');
        if (session) {
          this.user = JSON.parse(session);
          this.showApp();
        }
      }

      async handleAuth(e) {
        e.preventDefault();
        const name = document.getElementById('nameInput').value;
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;
        const uni = document.getElementById('uniInput').value;

        if (password.length < 6) {
          this.showError('Password must be at least 6 characters');
          return;
        }

        try {
          const { data: { user }, error: signUpError } = await supabase.auth.signUp({
            email,
            password
          });

          if (signUpError && signUpError.message.includes('already registered')) {
            const { data: { user: loginUser }, error: signInError } = await supabase.auth.signInWithPassword({
              email,
              password
            });
            if (signInError) throw signInError;
            const profileData = await supabase.from('student_profiles').select('*').eq('id', loginUser.id).single();
            this.user = { id: loginUser.id, name: profileData.data.username, email, uni: profileData.data.university, isCEO: email === 'Mwewadavid781@gmail.com' };
          } else if (signUpError) {
            throw signUpError;
          } else {
            const { error: profileError } = await supabase.from('student_profiles').insert({
              id: user.id,
              username: name,
              university: uni,
              program: 'General',
              branch: 'General',
              academic_year: 1,
              role: email === 'Mwewadavid781@gmail.com' ? 'ceo' : 'student'
            });
            if (profileError) throw profileError;
            this.user = { id: user.id, name, email, uni, isCEO: email === 'Mwewadavid781@gmail.com' };
          }

          sessionStorage.setItem('auraSession', JSON.stringify(this.user));
          document.getElementById('authForm').reset();
          this.showApp();
        } catch (err) {
          this.showError(err.message);
        }
      }

      showError(msg) {
        document.getElementById('errorMsg').textContent = '❌ ' + msg;
        document.getElementById('errorMsg').classList.add('show');
        setTimeout(() => document.getElementById('errorMsg').classList.remove('show'), 3000);
      }

      showApp() {
        document.getElementById('authView').classList.remove('active');
        document.getElementById('appView').classList.add('active');
        document.getElementById('greeting').textContent = `Hi ${this.user.name}! 🎓`;
        document.getElementById('profileName').textContent = this.user.name;
        document.getElementById('profileUni').textContent = this.user.uni;
        this.renderUnis();
        this.startCountdown();
      }

      renderUnis() {
        let html = '';
        for (const [code, uni] of Object.entries(UNIVERSITIES)) {
          html += `<div class="card" onclick="app.selectUni('${code}')"><div class="card-icon">${uni.icon}</div><div class="card-name">${uni.name}</div></div>`;
        }
        document.getElementById('uniGrid').innerHTML = html;
      }

      selectUni(code) {
        const schools = Object.keys(UNIVERSITIES[code].schools);
        let html = '';
        schools.forEach(s => {
          html += `<div class="list-item" onclick="app.selectSchool('${code}','${s}')"><div class="list-item-title">${s}</div></div>`;
        });
        document.getElementById('schoolList').innerHTML = html;
        document.getElementById('schoolTitle').textContent = UNIVERSITIES[code].name;
        this.goPage('school');
      }

      selectSchool(uni, school) {
        const programs = Object.keys(UNIVERSITIES[uni].schools[school].programs);
        let html = '';
        programs.forEach(p => {
          html += `<div class="list-item" onclick="app.selectProgram('${uni}','${school}','${p}')"><div class="list-item-title">${p}</div></div>`;
        });
        document.getElementById('programList').innerHTML = html;
        document.getElementById('programTitle').textContent = school;
        this.goPage('program');
      }

      selectProgram(uni, school, prog) {
        let html = '';
        for (let i = 1; i <= 5; i++) {
          html += `<div class="list-item" onclick="app.selectYear('${uni}','${school}','${prog}',${i})"><div class="list-item-title">Year ${i}</div></div>`;
        }
        document.getElementById('yearList').innerHTML = html;
        this.goPage('year');
      }

      selectYear(uni, school, prog, year) {
        let html = '';
        for (const [courseKey, courseData] of Object.entries(COURSES)) {
          const [code, title] = courseKey.split('|');
          const mastery = Math.floor(Math.random() * 100);
          html += `<div class="course-card" onclick="app.selectCourse('${courseKey}')">
            <div class="course-code">${code}</div>
            <div class="course-title">${title}</div>
            <div class="course-desc">${courseData.desc}</div>
            <div class="mastery-label"><span>Mastery:</span><span style="color:#00f0ff">${mastery}%</span></div>
            <div class="mastery-bar"><div class="mastery-fill" style="width:${mastery}%"></div></div>
            <div class="course-unit">${courseData.unit}</div>
            <div class="course-action">Start 30 Q Exam →</div>
          </div>`;
        }
        document.getElementById('courseList').innerHTML = html;
        this.goPage('course');
      }

      selectCourse(courseKey) {
        this.currentCourse = courseKey;
        const courseData = COURSES[courseKey];
        document.getElementById('examTitle').textContent = courseData.title;
        this.questions = courseData.questions;
        this.answers = new Array(this.questions.length).fill(null);
        this.renderExam();
        this.goPage('exam');
      }

      renderExam() {
        let html = '';
        this.questions.forEach((q, i) => {
          html += `<div class="question-card"><div class="question-num">Q${i+1}/${this.questions.length}</div><div class="question-text">${q.q}</div><div class="options">`;
          q.opts.forEach((opt, j) => {
            html += `<button class="option-btn" onclick="app.answer(${i},${j})">${String.fromCharCode(65+j)}: ${opt}</button>`;
          });
          html += `</div></div>`;
        });
        html += `<button class="exam-btn" style="margin-top:20px" onclick="app.finishExam()">Submit Exam</button>`;
        document.getElementById('examContent').innerHTML = html;
      }

      answer(qIdx, optIdx) {
        this.answers[qIdx] = optIdx;
        const qDiv = document.querySelectorAll('.question-card')[qIdx];
        const btns = qDiv.querySelectorAll('.option-btn');
        btns.forEach(b => b.classList.remove('correct', 'incorrect'));
        const isCorrect = this.questions[qIdx].c === optIdx;
        if (isCorrect) {
          btns[optIdx].classList.add('correct');
        } else {
          btns[optIdx].classList.add('incorrect');
          btns[this.questions[qIdx].c].classList.add('correct');
        }
      }

      finishExam() {
        let correct = 0;
        this.questions.forEach((q, i) => {
          if (this.answers[i] === q.c) correct++;
        });
        const pct = Math.round((correct / this.questions.length) * 100);
        
        let html = `<div class="score-display"><div class="score-num">${pct}%</div><div class="score-label">${correct}/${this.questions.length} correct</div></div>`;
        
        this.questions.forEach((q, i) => {
          const isCorrect = this.answers[i] === q.c;
          html += `<div class="question-card"><div class="question-num">Q${i+1}</div><div class="question-text">${q.q}</div><div style="color:${isCorrect ? '#05ffb2' : '#ff2e93'};font-size:12px;margin:10px 0">${isCorrect ? '✅ Correct' : '❌ Incorrect'}</div><div class="explanation">💡 ${q.e}</div></div>`;
        });
        
        html += `<button class="exam-btn" style="margin-top:20px" onclick="app.goPage('course')">Back to Courses</button>`;
        document.getElementById('resultsContent').innerHTML = html;
        this.goPage('results');
      }

      goPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
      }

      showPayment() {
        const html = `<h2 class="modal-title">💳 Extend Access</h2>
          <div style="background:#060913;border:1px solid #1e293b;padding:14px;border-radius:8px;margin-bottom:14px">
            <div style="font-size:12px;color:#00f0ff;font-weight:700;margin-bottom:8px">📱 MTN Mobile Money</div>
            <div style="font-size:11px;color:#94a3b8">Send K10 to <strong>0964969767</strong></div>
            <div style="font-size:11px;color:#94a3b8;margin-top:8px">WhatsApp proof: <strong>+260750109917</strong></div>
          </div>
          <button class="exam-btn" onclick="window.open('https://wa.me/260750109917','_blank')">📱 Contact on WhatsApp</button>`;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.add('show');
      }

      closeModal() {
        document.getElementById('modal').classList.remove('show');
      }

      startCountdown() {
        setInterval(() => {
          const subEnd = new Date(Date.now() + 7*24*60*60*1000);
          const diff = subEnd - Date.now();
          const days = Math.floor(diff / (1000*60*60*24));
          const hrs = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
          document.getElementById('countdown').textContent = `${days}d ${hrs}h`;
        }, 1000);
      }

      logout() {
        sessionStorage.removeItem('auraSession');
        supabase.auth.signOut();
        window.location.reload();
      }
    }

    const app = new App();
  </script>
