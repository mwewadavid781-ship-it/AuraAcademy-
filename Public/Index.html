<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA - Starfield</title>
    <style>
        html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
        canvas#scene { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
        #scroll-host { height: 300vh; }
        #scroll-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: #aef6cf; font-size: 12px; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="scene"></canvas>
    <div id="scroll-host"></div>
    <div id="scroll-hint">SCROLL ↓</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.143.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.143.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GammaCorrectionShader } from 'three/addons/shaders/GammaCorrectionShader.js';
        import { CopyShader } from 'three/addons/shaders/CopyShader.js';

        const CONFIG = {
            bgColor: '#0a0a24',
            flameColor: '#aee9ff',
            flameColor2: '#c79bff',
            flameAmt: 0.2,
            colorA: '#aef6cf',
            colorB: '#5fe6a0',
            colorC: '#eafff2',
            opacity: 2,
            pointSize: 50,
            brightness: 1.85,
            drift: 2.35,
            twinkle: 1,
            spin: 0.03,
            repelRadius: 5,
            repelStrength: 0.35,
            scrollPush: 8,
            scrollDrift: 6,
            scrollSpin: 0.1,
            parallax: 0.6
        };

        const LAYERS = {
            NONE: 0,
            TORUS_SCENE: 1,
            BLOOM_SCENE: 2,
            ENTIRE_SCENE: 3
        };

        let canvas = document.getElementById('scene');
        let renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.VSMShadowMap;

        let scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 0, 15);

        let camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 80);
        camera.position.set(0, 0, 5);
        camera.layers.enable(LAYERS.TORUS_SCENE);
        camera.layers.enable(LAYERS.BLOOM_SCENE);
        camera.layers.enable(LAYERS.ENTIRE_SCENE);
        scene.add(camera);

        function hexToVec3(hex) {
            const n = parseInt(hex.slice(1), 16);
            return new THREE.Vector3(((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255);
        }

        let renderScene = new RenderPass(scene, camera);
        let torusComposer = new EffectComposer(renderer);
        torusComposer.renderToScreen = false;
        torusComposer.addPass(renderScene);
        torusComposer.addPass(new ShaderPass(GammaCorrectionShader));
        torusComposer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.22, 0.2, 0));
        torusComposer.addPass(new ShaderPass(CopyShader));

        let bloomComposer = new EffectComposer(renderer);
        bloomComposer.renderToScreen = false;
        bloomComposer.addPass(renderScene);
        bloomComposer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.55, 0));
        bloomComposer.addPass(new ShaderPass(GammaCorrectionShader));

        const FinalPass = {
            uniforms: {
                iTime: { value: 0 },
                tDiffuse: { value: null },
                torusTexture: { value: null },
                bloomTexture: { value: null },
                haloTexture: { value: null },
                uBg: { value: hexToVec3('#0a0a24') },
                uFlameA: { value: hexToVec3('#aee9ff') },
                uFlameB: { value: hexToVec3('#c79bff') },
                uFlameAmt: { value: 0.2 }
            },
            vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }`,
            fragmentShader: `
                uniform float iTime; 
                uniform sampler2D tDiffuse; 
                uniform sampler2D bloomTexture; 
                uniform sampler2D torusTexture; 
                uniform sampler2D haloTexture;
                uniform vec3 uBg; 
                uniform vec3 uFlameA; 
                uniform vec3 uFlameB; 
                uniform float uFlameAmt;
                varying vec2 vUv;
                vec3 warp3d(vec3 pos, float t){
                    float curv=.8,a=1.9,b=0.7;
                    pos*=2.;
                    pos.x+=curv*sin(t+a*pos.y)+t*b;
                    pos.y+=curv*cos(t+a*pos.x);
                    pos.y+=curv*sin(t+a*pos.z)+t*b;
                    pos.z+=curv*cos(t+a*pos.y);
                    pos.z+=curv*sin(t+a*pos.x)+t*b;
                    pos.x+=curv*cos(t+a*pos.z);
                    return 0.5+0.5*cos(pos.xyz+vec3(1,2,4));
                }
                void main(){
                    vec2 uv = 2.*vUv - 1.;
                    vec3 w = pow(warp3d(vec3(uv.x, sin(uv.y), uv.y), iTime*1.5), vec3(1.5));
                    vec3 flame = 1.5*uFlameA*w.x;
                    flame*=w.y;
                    flame += uFlameB*w.z;
                    flame *= smoothstep(0.25, 1., abs(uv.y));
                    float md = smoothstep(-0.7, 1., -uv.y*uv.x);
                    flame *= md*md;
                    vec3 bg = uBg * (1.0 - 0.4 * length(uv));
                    vec3 halo = texture2D(haloTexture, vUv).xyz;
                    gl_FragColor = vec4(bg + flame*uFlameAmt + texture2D(bloomTexture, vUv).xyz + texture2D(torusTexture, vUv).xyz + texture2D(tDiffuse, vUv).xyz + halo, 1.);
                }
            `
        };

        let finalPass = new ShaderPass(FinalPass);
        finalPass.uniforms.bloomTexture.value = bloomComposer.renderTarget1.texture;
        finalPass.uniforms.torusTexture.value = torusComposer.renderTarget1.texture;

        let finalComposer = new EffectComposer(renderer);
        finalComposer.addPass(renderScene);
        finalComposer.addPass(finalPass);

        const vertexShader = `
            uniform float uTime; 
            uniform float uSize; 
            uniform float uDrift; 
            uniform float uDepth; 
            uniform float uTwinkle;
            uniform vec3 uCursor; 
            uniform float uRepelRadius; 
            uniform float uRepelStrength; 
            uniform float uActivity;
            uniform vec3 uColorA; 
            uniform vec3 uColorB; 
            uniform vec3 uColorC;
            attribute float aScale; 
            attribute float aPhase; 
            attribute float aPalette; 
            attribute float aBright;
            varying vec3 vColor; 
            varying float vTwinkle;
            void main() {
                vec3 pos = position;
                pos.z = mod(pos.z + uDrift + (uDepth * 0.5), uDepth) - (uDepth * 0.5);
                float tw = sin(uTime * 1.6 + aPhase * 6.2831);
                vTwinkle = (1.0 - uTwinkle) + uTwinkle * (0.55 + 0.45 * tw);
                vec4 modelPosition = modelMatrix * vec4(pos, 1.0);
                vec3 toParticle = modelPosition.xyz - uCursor;
                float dist = length(toParticle);
                float falloff = smoothstep(uRepelRadius, 0.0, dist);
                modelPosition.xyz += normalize(toParticle + vec3(0.0001)) * falloff * uRepelStrength * uActivity;
                vec4 viewPosition = viewMatrix * modelPosition;
                gl_Position = projectionMatrix * viewPosition;
                gl_PointSize = uSize * aScale;
                gl_PointSize *= (1.0 / -viewPosition.z);
                vec3 base = aPalette < 0.5 ? uColorA : (aPalette < 1.5 ? uColorB : uColorC);
                vColor = base * aBright;
            }
        `;

        const fragmentShader = `
            uniform float uOpacity; 
            uniform float uBrightness;
            varying vec3 vColor; 
            varying float vTwinkle;
            void main() {
                vec2 uv = gl_PointCoord - 0.5;
                float d = length(uv);
                if (d > 0.5) discard;
                float strength = pow(1.0 - d * 2.0, 4.0);
                vec3 color = mix(vec3(0.0), vColor, strength);
                gl_FragColor = vec4(color * uBrightness, strength * uOpacity * vTwinkle);
            }
        `;

        const count = 4200;
        const depth = 30;
        let positions = new Float32Array(count * 3);
        let palette = new Float32Array(count);
        let bright = new Float32Array(count);
        let scales = new Float32Array(count);
        let phases = new Float32Array(count);

        for (let i = 0; i < count; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 24;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 16;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 30;
            palette[i] = Math.floor(Math.random() * 3);
            bright[i] = 0.7 + Math.random() * 0.6;
            scales[i] = 0.5 + Math.pow(Math.random(), 1.4) * 2.5;
            phases[i] = Math.random();
        }

        let geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));
        geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
        geometry.setAttribute('aPalette', new THREE.BufferAttribute(palette, 1));
        geometry.setAttribute('aBright', new THREE.BufferAttribute(bright, 1));

        let material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uSize: { value: CONFIG.pointSize },
                uOpacity: { value: 0 },
                uDrift: { value: 0 },
                uDepth: { value: depth },
                uTwinkle: { value: CONFIG.twinkle },
                uCursor: { value: new THREE.Vector3() },
                uRepelRadius: { value: CONFIG.repelRadius },
                uRepelStrength: { value: CONFIG.repelStrength },
                uActivity: { value: 0 },
                uColorA: { value: hexToVec3(CONFIG.colorA) },
                uColorB: { value: hexToVec3(CONFIG.colorB) },
                uColorC: { value: hexToVec3(CONFIG.colorC) },
                uBrightness: { value: CONFIG.brightness }
            },
            vertexShader,
            fragmentShader,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        let points = new THREE.Points(geometry, material);
        points.layers.enable(LAYERS.ENTIRE_SCENE);
        
        let group = new THREE.Group();
        group.add(points);
        scene.add(group);

        let POINTER = {
            world: new THREE.Vector3(),
            activity: 0,
            ndc: new THREE.Vector2(),
            lastMove: Date.now()
        };

        let scrollCurrent = 0, scrollSmooth = 0, scrollTarget = 0;
        let mouseSmooth = new THREE.Vector2();
        let t0 = performance.now() / 1000;
        let appearStart = Date.now();

        document.addEventListener('mousemove', (e) => {
            POINTER.ndc.x = (e.clientX / window.innerWidth) * 2 - 1;
            POINTER.ndc.y = -((e.clientY / window.innerHeight) * 2 - 1);
            POINTER.lastMove = Date.now();
        });

        document.addEventListener('mouseout', () => {});

        function updatePointer() {
            let idle = (Date.now() - POINTER.lastMove) / 1000;
            let want = idle < 3 ? 1 : 0;
            POINTER.activity += (want - POINTER.activity) * 0.06;

            let ndc = POINTER.ndc;
            let dir = new THREE.Vector3(ndc.x, ndc.y, -1).unproject(camera).sub(camera.position).normalize();
            if (Math.abs(dir.z) > 1e-4) {
                let t = -camera.position.z / dir.z;
                if (t > 0 && isFinite(t)) {
                    let target = camera.position.clone().add(dir.multiplyScalar(t));
                    POINTER.world.lerp(target, 0.12);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            scrollTarget = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            scrollSmooth = THREE.MathUtils.lerp(scrollSmooth, scrollTarget, 0.10);
            scrollCurrent = THREE.MathUtils.lerp(scrollCurrent, scrollSmooth, 0.06);

            mouseSmooth.lerp(POINTER.ndc, 0.06);

            let t = performance.now() / 1000;
            let dt = Math.min(0.05, t - t0);
            t0 = t;

            material.uniforms.uTime.value = t;
            material.uniforms.uDrift.value += dt * (CONFIG.drift + scrollCurrent * CONFIG.scrollDrift);
            material.uniforms.uCursor.value = POINTER.world;
            material.uniforms.uActivity.value = POINTER.activity;

            camera.position.set(mouseSmooth.x * 0.6, mouseSmooth.y * 0.6, 5 - scrollCurrent * 8);
            camera.lookAt(mouseSmooth.x * 0.6, mouseSmooth.y * 0.6, -10);

            let elapsed = Date.now() - appearStart;
            let fade = Math.max(0, Math.min(1, (elapsed - 300) / 1400));
            material.uniforms.uOpacity.value = fade * 2;

            group.rotation.z += dt * (CONFIG.spin + scrollCurrent * CONFIG.scrollSpin);

            updatePointer();

            finalPass.uniforms.iTime.value = t;

            camera.layers.set(LAYERS.TORUS_SCENE);
            torusComposer.render();
            camera.layers.set(LAYERS.BLOOM_SCENE);
            bloomComposer.render();
            camera.layers.set(LAYERS.ENTIRE_SCENE);
            finalComposer.render();
        }

        function onWindowResize() {
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            torusComposer.setPixelRatio(window.devicePixelRatio);
            torusComposer.setSize(window.innerWidth, window.innerHeight);
            bloomComposer.setPixelRatio(window.devicePixelRatio);
            bloomComposer.setSize(window.innerWidth, window.innerHeight);
            finalComposer.setPixelRatio(window.devicePixelRatio);
            finalComposer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('resize', onWindowResize);
        renderer.setSize(window.innerWidth, window.innerHeight);
        animate();
    </script>
</body>
</html>
