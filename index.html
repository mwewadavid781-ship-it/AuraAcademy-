<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA ACADEMY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #f1f5f9; }
    .view { display: none; } .view.active { display: block; }
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #0f1626 0%, #0a0e1a 100%); }
    .auth-card { background: #0f1626; border: 1px solid #1e293b; border-radius: 12px; padding: 28px; max-width: 380px; width: 100%; }
    .auth-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; color: #00f0ff; }
    .auth-subtitle { font-size: 11px; color: #64748b; margin-bottom: 20px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; }
    input, select { width: 100%; padding: 10px; border: 1px solid #1e293b; border-radius: 6px; background: #060913; color: #f1f5f9; font-size: 13px; font-family: inherit; }
    input:focus, select:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
    .btn { width: 100%; padding: 11px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.3s; font-family: inherit; }
    .btn-cyan { background: #00f0ff; color: #0a0e1a; }
    .btn-cyan:hover { box-shadow: 0 0 30px rgba(0, 240, 255, 0.5); }
    .error-msg { background: rgba(255, 46, 147, 0.1); border: 1px solid #ff2e93; color: #ff2e93; padding: 8px; border-radius: 4px; font-size: 11px; margin-bottom: 12px; display: none; }
    .error-msg.show { display: block; }
    .app-container { display: flex; flex-direction: column; height: 100vh; }
    .header { padding: 14px 20px; border-bottom: 1px solid #1e293b; background: #0f1626; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 16px; font-weight: 700; color: #00f0ff; }
    .countdown-box { background: rgba(255, 46, 147, 0.1); border: 1px solid #ff2e93; padding: 6px 10px; border-radius: 4px; font-size: 11px; color: #ff2e93; font-weight: 700; cursor: pointer; }
    .content { flex: 1; overflow-y: auto; padding: 16px 20px 80px; }
    .page { display: none; } .page.active { display: block; }
    .page-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .page-subtitle { font-size: 11px; color: #64748b; margin-bottom: 16px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: linear-gradient(135deg, #1a2a3a 0%, #0f1626 100%); border: 1px solid #1e293b; border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.3s; }
    .card:hover { border-color: #00f0ff; box-shadow: 0 0 20px rgba(0, 240, 255, 0.1); }
    .card-icon { font-size: 24px; margin-bottom: 8px; }
    .card-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .card-meta { font-size: 10px; color: #64748b; }
    .list-card { background: #0f1626; border: 1px solid #1e293b; border-radius: 6px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; }
    .list-card:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.05); }
    .list-card h3 { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .list-card p { font-size: 10px; color: #64748b; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; z-index: 50; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .modal-overlay.show { opacity: 1; visibility: visible; }
    .modal { background: #0f1626; border: 1px solid #1e293b; border-radius: 10px; padding: 20px; max-width: 450px; max-height: 80vh; overflow-y: auto; width: 90vw; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #00f0ff; }
    .summary-text { font-size: 11px; line-height: 1.6; color: #94a3b8; margin-bottom: 16px; white-space: pre-wrap; }
    .exam-btn { width: 100%; padding: 10px; background: linear-gradient(90deg, #00f0ff, #05ffb2); color: #0a0e1a; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px; font-family: inherit; }
    .question { background: #060913; border: 1px solid #1e293b; padding: 12px; border-radius: 6px; margin-bottom: 12px; }
    .q-text { font-size: 12px; font-weight: 600; margin-bottom: 10px; }
    .options { display: flex; flex-direction: column; gap: 6px; }
    .option { background: transparent; border: 1.5px solid #1e293b; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.3s; font-family: inherit; }
    .option:hover { border-color: #00f0ff; }
    .option.correct { border-color: #05ffb2; background: rgba(5, 255, 178, 0.1); color: #05ffb2; }
    .option.incorrect { border-color: #ff2e93; background: rgba(255, 46, 147, 0.1); color: #ff2e93; }
    .score-display { text-align: center; padding: 16px; background: rgba(0, 240, 255, 0.1); border-radius: 6px; margin-bottom: 16px; }
    .score-num { font-size: 28px; font-weight: 700; color: #00f0ff; }
    .score-label { font-size: 10px; color: #64748b; margin-top: 4px; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #0f1626; border-top: 1px solid #1e293b; display: flex; justify-content: space-around; z-index: 40; }
    .nav-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 20px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px; transition: all 0.3s; }
    .nav-btn.active { color: #00f0ff; }
    .nav-label { font-size: 9px; color: inherit; }
    .logout-btn { background: transparent; border: 1px solid #1e293b; color: #64748b; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
    .logout-btn:hover { border-color: #ff2e93; color: #ff2e93; }
    .payment-section { background: #060913; padding: 12px; border-radius: 6px; margin-bottom: 12px; }
    .payment-section h4 { color: #00f0ff; margin-bottom: 6px; font-size: 11px; }
    .payment-section p { font-size: 10px; color: #64748b; margin: 2px 0; }
  </style>
</head>
<body>
  <!-- AUTH VIEW -->
  <div id="authView" class="view active">
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">🇿🇲 AURA</h1>
        <p class="auth-subtitle">Zambian University Study</p>
        <div class="error-msg" id="errorMsg"></div>

        <form onsubmit="app.login(event)">
          <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" id="nameInput" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="emailInput" placeholder="email@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">University</label>
            <select id="uniInput" required>
              <option value="">Select</option>
              <option value="UNZA">UNZA</option>
              <option value="CBU">CBU</option>
              <option value="Mulungushi">Mulungushi</option>
              <option value="LAMU">LAMU</option>
            </select>
          </div>
          <button type="submit" class="btn btn-cyan">Enter AURA</button>
        </form>
      </div>
    </div>
  </div>

  <!-- APP VIEW -->
  <div id="appView" class="view">
    <div id="modal" class="modal-overlay">
      <div class="modal">
        <button class="modal-close" onclick="app.closeModal()">✕</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <div class="app-container">
      <div class="header">
        <div class="header-title">🇿🇲 AURA</div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <div class="countdown-box" id="countdown">7d left</div>
          <button class="logout-btn" onclick="app.logout()">Logout</button>
        </div>
      </div>

      <div class="content">
        <div id="homePage" class="page active">
          <div class="page-title">Welcome!</div>
          <p class="page-subtitle" id="greeting">Hi there!</p>
          <div id="uniGrid"></div>
        </div>

        <div id="schoolPage" class="page">
          <div class="page-title" id="schoolTitle">Schools</div>
          <p class="page-subtitle">Select a school</p>
          <div id="schoolList"></div>
        </div>

        <div id="coursePage" class="page">
          <div class="page-title">Courses</div>
          <p class="page-subtitle">Select a course</p>
          <div id="courseList"></div>
        </div>

        <div id="profilePage" class="page">
          <div class="page-title">Profile</div>
          <div class="list-card">
            <h3 id="profileName">Name</h3>
            <p id="profileUni">University</p>
          </div>
          <button class="btn btn-cyan" style="margin-top: 16px;" onclick="app.logout()">Logout</button>
        </div>
      </div>

      <div class="bottom-nav">
        <button class="nav-btn active" onclick="app.goPage('home')">🏠<span class="nav-label">Home</span></button>
        <button class="nav-btn" onclick="app.goPage('course')">📚<span class="nav-label">Courses</span></button>
        <button class="nav-btn" onclick="app.goPage('profile')">👤<span class="nav-label">Profile</span></button>
      </div>
    </div>
  </div>

  <script>
    const UNIS = {
      UNZA: {
        name: 'UNZA', icon: '🦅',
        schools: {
          'Engineering': ['Civil', 'Electrical', 'Mechanical'],
          'Medicine': ['Surgery', 'Pharmacy', 'Nursing'],
          'Law': ['LLB'],
          'Business': ['Accounting', 'Marketing']
        }
      },
      CBU: {
        name: 'CBU', icon: '⛏️',
        schools: {
          'Engineering': ['Electrical', 'Mechanical', 'Mechatronics'],
          'Medicine': ['Surgery'],
          'ICT': ['Computer Science', 'Software'],
          'Business': ['Accounting']
        }
      },
      Mulungushi: {
        name: 'Mulungushi', icon: '📚',
        schools: {
          'Engineering': ['Civil', 'Mechanical'],
          'Medicine': ['Pharmacy'],
          'Business': ['Accounting']
        }
      },
      LAMU: {
        name: 'LAMU', icon: '🏨',
        schools: {
          'Medicine': ['Surgery'],
          'Health': ['Pharmacy', 'Physio']
        }
      }
    };

    const COURSES = {
      'Math': '📚 MATHEMATICS\n\n⚡ Calculus, Algebra, Equations\n\n💡 Practice daily!',
      'Physics': '📚 PHYSICS\n\n⚡ Mechanics, Electricity, Waves\n\n💡 SI units!',
      'Chemistry': '📚 CHEMISTRY\n\n⚡ Atoms, Bonds, Reactions\n\n💡 Balance equations!',
      'Programming': '📚 PROGRAMMING\n\n⚡ Code, Functions, OOP\n\n💡 Code every day!'
    };

    class AuraApp {
      constructor() {
        const saved = localStorage.getItem('auraUser');
        if (saved) {
          this.user = JSON.parse(saved);
          this.showApp();
        }
      }

      login(e) {
        e.preventDefault();
        const name = document.getElementById('nameInput').value;
        const email = document.getElementById('emailInput').value;
        const uni = document.getElementById('uniInput').value;

        if (!name || !email || !uni) {
          document.getElementById('errorMsg').textContent = 'Fill all!';
          document.getElementById('errorMsg').classList.add('show');
          return;
        }

        this.user = { name, email, uni, isCEO: email === 'Mwewadavid781@gmail.com' };
        localStorage.setItem('auraUser', JSON.stringify(this.user));
        this.showApp();
      }

      showApp() {
        document.getElementById('authView').classList.remove('active');
        document.getElementById('appView').classList.add('active');
        document.getElementById('greeting').textContent = `Hi ${this.user.name}!`;
        document.getElementById('profileName').textContent = this.user.name;
        document.getElementById('profileUni').textContent = `${this.user.uni} University`;
        this.renderUnis();
        this.tick();
      }

      renderUnis() {
        let html = '';
        for (const [code, uni] of Object.entries(UNIS)) {
          html += `<div class="card" onclick="app.pickUni('${code}')"><div class="card-icon">${uni.icon}</div><div class="card-title">${uni.name}</div></div>`;
        }
        document.getElementById('uniGrid').innerHTML = html;
      }

      pickUni(code) {
        const schools = Object.keys(UNIS[code].schools);
        let html = '';
        schools.forEach(s => {
          html += `<div class="list-card" onclick="app.pickSchool('${code}','${s}')"><h3>${s}</h3></div>`;
        });
        document.getElementById('schoolList').innerHTML = html;
        document.getElementById('schoolTitle').textContent = UNIS[code].name;
        this.goPage('school');
      }

      pickSchool(uni, school) {
        const courses = Object.keys(COURSES);
        let html = '';
        courses.forEach(c => {
          html += `<div class="list-card" onclick="app.showCourse('${c}')"><h3>${c}</h3><p>${school}</p></div>`;
        });
        document.getElementById('courseList').innerHTML = html;
        this.goPage('course');
      }

      showCourse(course) {
        const html = `
          <h2 class="modal-title">${course}</h2>
          <div class="summary-text">${COURSES[course]}</div>
          <button class="exam-btn" onclick="app.startExam('${course}')">📝 Exam (3 Q)</button>
        `;
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modal').classList.add('show');
      }

      startExam(course) {
        const qs = [
          { q: 'Q1: Select correct', opts: ['A', 'B', 'C', 'D'], c: 0 },
          { q: 'Q2: Pick answer', opts: ['1', '2', '3', '4'], c: 1 },
          { q: 'Q3: Find it', opts: ['X', 'Y', 'Z', 'W'], c: 2 }
        ];

        let html = `<h2 class="modal-title">${course} Exam</h2>`;
        qs.forEach((q, i) => {
          html += `<div class="question"><div class="q-text">${q.q}</div><div class="options">`;
          q.opts.forEach((o, j) => {
            html += `<button class="option" onclick="app.ans(this,${j},${q.c})">${o}</button>`;
          });
          html += `</div></div>`;
        });
        html += `<button class="exam-btn" onclick="app.endExam()">Score</button>`;
        document.getElementById('modalContent').innerHTML = html;
      }

      ans(btn, sel, cor) {
        const par = btn.parentElement;
        par.querySelectorAll('.option').forEach(b => b.disabled = true);
        if (sel === cor) {
          btn.classList.add('correct');
          window.score = (window.score || 0) + 1;
        } else {
          btn.classList.add('incorrect');
          par.querySelectorAll('.option')[cor].classList.add('correct');
        }
        window.total = (window.total || 0) + 1;
      }

      endExam() {
        const pct = Math.round((window.score / window.total) * 100);
        const html = `
          <h2 class="modal-title">✅ Done!</h2>
          <div class="score-display"><div class="score-num">${pct}%</div><div class="score-label">${window.score}/${window.total}</div></div>
          <button class="exam-btn" onclick="app.closeModal()">Back</button>
        `;
        document.getElementById('modalContent').innerHTML = html;
        window.score = 0;
        window.total = 0;
      }

      closeModal() {
        document.getElementById('modal').classList.remove('show');
      }

      goPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        event.target.closest('.nav-btn')?.classList.add('active');
      }

      tick() {
        setInterval(() => {
          const d = new Date();
          d.setDate(d.getDate() + 7);
          const diff = d - Date.now();
          const days = Math.floor(diff / (1000*60*60*24));
          const hrs = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
          document.getElementById('countdown').textContent = `${days}d ${hrs}h`;
        }, 1000);
      }

      logout() {
        localStorage.removeItem('auraUser');
        document.getElementById('appView').classList.remove('active');
        document.getElementById('authView').classList.add('active');
        location.reload();
      }
    }

    const app = new AuraApp();
  </script>
</body>
</html>
