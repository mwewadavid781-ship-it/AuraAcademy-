<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA Starfield</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.143.0/build/three.module.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0a0a24);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 5;

        // STARS
        const starsGeometry = new THREE.BufferGeometry();
        const count = 4200;
        const depth = 30;

        let positions = new Float32Array(count * 3);
        let colors = new Float32Array(count * 3);
        let sizes = new Float32Array(count);

        const colorA = new THREE.Color(0xaef6cf); // mint
        const colorB = new THREE.Color(0x5fe6a0); // jade
        const colorC = new THREE.Color(0xeafff2); // bone

        for (let i = 0; i < count; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 24;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 16;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 30;

            let palette = Math.floor(Math.random() * 3);
            let color = palette === 0 ? colorA : palette === 1 ? colorB : colorC;
            let bright = 0.7 + Math.random() * 0.6;

            colors[i * 3] = color.r * bright;
            colors[i * 3 + 1] = color.g * bright;
            colors[i * 3 + 2] = color.b * bright;

            sizes[i] = 0.5 + Math.pow(Math.random(), 1.4) * 2.5;
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        starsGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const starsMaterial = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            sizeAttenuation: true
        });

        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        let drift = 0;
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 - 1;
        });

        window.addEventListener('scroll', () => {
            let scroll = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            drift += scroll * 0.1;
        });

        function animate() {
            requestAnimationFrame(animate);

            drift += 0.01;
            stars.position.z = drift % depth - depth / 2;
            stars.rotation.z += 0.0001;

            camera.position.x = mouseX * 2;
            camera.position.y = mouseY * 2;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
